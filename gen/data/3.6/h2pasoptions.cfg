[h2p.options]
Debug=no
PreProcIncludePattern=<openssl/\([A-Za-z0-9_]\+\)\.h>
IgnoreIncludedHeaders=stddef

[h2p.pascal]
UseAnsiChar=yes
UseCTypesUnit=no
EnumAsConstants=no
Ppointers=yes
Ttypenames=yes
PackRecords=no
VarArguments=no
EnableSysTrap=no
InlineMacroExpansions=yes
known_types=OPENSSL_sk_freefunc OPENSSL_sk_copyfunc OPENSSL_sk_compfunc
function_types=pem_password_cb 

[h2p.output]
CompactOutput=no
External=yes
ExternalLibname=CLibCrypto
CLibCrypto.LoadProc=LoadLibCryptoFunction
CLibSSL.LoadProc=LoadLibSSLFunction
Template=../openssl.pst
StripComments=no
StripInfo=yes
Win32headers=no
UnitNamePrefix=openssl_
StaticLibDefinedSymbol=OPENSSL_STATIC_LINK_MODEL
createdynlib=yes
LoadFailException=EOpenSSLAPIFunctionNotPresent
ExternalSym=yes
LegacySupport=no

[h2p.TypeNameMap]
shortint=TOpenSSL_C_UINT8
Pshortint=POpenSSL_C_UINT8
smallint=TOpenSSL_C_SHORT
Psmallint=POpenSSL_C_SHORT
Pchar=POpenSSLChar 
Pansichar=PAnsiChar
longint=TOpenSSL_C_INT 
Plongint=POpenSSL_C_INT 
integer=TOpenSSL_C_INT 
Pinteger=POpenSSL_C_INT 
word=TOpenSSL_C_UINT16
Pword=POpenSSL_C_UINT16
PPword=PPOpenSSL_C_UINT16
Pdword=POpenSSL_C_UINT
dword=TOpenSSL_C_UINT 
int64=TOpenSSL_C_LONG 
Pint64=POpenSSL_C_LONG 
double=TOpenSSL_C_DOUBLE
Pdouble=POpenSSL_C_DOUBLE
uint=TOpenSSL_C_UINT 
Puint=POpenSSL_C_UINT 
size_t=TOpenSSL_C_SIZET 
Psize_t=POpenSSL_C_SIZET 
ssize_t=TOpenSSL_C_SSIZET 
Pssize_t=POpenSSL_C_SSIZET 
uint_64=TOpenSSL_C_UINT64 
Puint_64=POpenSSL_C_UINT64 
Ptimeval=POpenSSL_timeval
Ttimeval=TOpenSSL_timeval
Ttime_t=TOpenSSL_C_TIMET
Ptime_t=POpenSSL_C_TIMET
Ttm=TOpenSSL_C_TM
Ptm=POpenSSL_C_TM
int64=TOpenSSL_C_INT64
qword=TOpenSSL_C_UINT64
Pqword=POpenSSL_C_UINT64
Tuintptr_t=PByte

